<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DeFiSpark Wallet - USDT (BSC)</title>
  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsqr.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3@4.0.3/dist/web3.min.js"></script>
  <style>
    :root {
      --primary: #10b981;
      --success: #059669;
      --bg: #f8f9fc;
      --card: #ffffff;
      --danger: #ef4444;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: var(--card);
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 26px; margin: 0 0 8px; color: #111; }
    .subtitle { color: #64748b; font-size: 15px; margin-bottom: 20px; }
    .warning {
      background: #fef2f2;
      color: #991b1b;
      padding: 12px;
      border-radius: 12px;
      margin: 16px 0;
      font-size: 14px;
      border: 1px solid #fecaca;
    }
    .address-box {
      background: #f1f5f9;
      padding: 14px;
      border-radius: 12px;
      font-family: monospace;
      word-break: break-all;
      font-size: 15px;
      color: #1e40af;
      position: relative;
      margin: 16px 0;
    }
    .copy-btn {
      position: absolute;
      right: 8px;
      top: 8px;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .tab-buttons {
      display: flex;
      justify-content: space-around;
      margin: 20px 0 16px;
    }
    .tab-btn {
      flex: 1;
      background: #e5e7eb;
      border: none;
      padding: 12px;
      margin: 0 4px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
    }
    .tab-btn.active {
      background: var(--primary);
      color: white;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .input-group {
      margin: 20px 0;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #374151;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }
    button.main-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 12px auto;
      display: block;
    }
    button.main-btn:hover { background: #059669; }
    #qrcode { margin: 24px auto; }
    #video {
      width: 100%;
      max-width: 320px;
      border-radius: 12px;
      margin: 16px auto;
      display: block;
    }
    .status {
      padding: 16px;
      border-radius: 12px;
      font-weight: 600;
      margin: 16px 0;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .waiting { background: #fef3c7; color: #92400e; }
    .success { background: #d1fae5; color: #065f46; border: 2px solid #86efac; }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link href="https://rsms.me/inter/inter.css" rel="stylesheet">
</head>
<body>

<div class="container">
  <h1>DeFiSpark Wallet</h1>
  <p class="subtitle">Simple USDT Wallet on Binance Smart Chain (BSC)</p>

  <div class="warning">
    ⚠️ Educational / Demo wallet only!<br>
    Private keys are stored in browser (localStorage). Use tiny amounts for learning.<br>
    Refreshing loses wallet unless you save your private key.
  </div>

  <div class="input-group">
    <label>Private Key (hex) or Generate New</label>
    <input type="text" id="privateKey" placeholder="0x... (48 chars)">
    <button class="main-btn" onclick="generateNewWallet()">Generate New Wallet</button>
    <button class="main-btn" onclick="importWallet()" style="background:#3b82f6">Import Existing</button>
  </div>

  <div id="walletDashboard" style="display:none;">
    <div class="address-box">
      <span id="userAddress">—</span>
      <button class="copy-btn" onclick="copyAddress()">Copy</button>
    </div>

    <p><strong>USDT Balance:</strong> <span id="balance">0.00</span> USDT</p>
    <button class="main-btn" onclick="checkBalance()" style="background:#6b7280; font-size:14px; padding:10px 20px;">Refresh Balance</button>

    <div class="tab-buttons">
      <button class="tab-btn active" onclick="openTab('receive')">Receive</button>
      <button class="tab-btn" onclick="openTab('send')">Send</button>
      <button class="tab-btn" onclick="openTab('scan')">Scan QR</button>
    </div>

    <div id="receive" class="tab-content active">
      <div class="input-group">
        <label>Amount to Request (USDT)</label>
        <input type="number" id="receiveAmount" placeholder="e.g. 50" step="0.01" min="0.01">
        <button class="main-btn" onclick="generateReceiveQR()">Generate QR</button>
      </div>
      <div id="qrcode"></div>
    </div>

    <div id="send" class="tab-content">
      <div class="input-group">
        <label>Send To Address</label>
        <input type="text" id="sendTo" placeholder="0x...">
        <label>Amount (USDT)</label>
        <input type="number" id="sendAmount" placeholder="e.g. 10" step="0.01" min="0.01">
        <button class="main-btn" onclick="sendUSDT()">Send Now</button>
      </div>
      <div id="sendStatus" class="status waiting" style="display:none;">
        <span class="spinner"></span> <span id="sendMsg">Processing transaction...</span>
      </div>
    </div>

    <div id="scan" class="tab-content">
      <button class="main-btn" onclick="startQRScanner()">Start Camera Scanner</button>
      <video id="video" playsinline autoplay muted style="display:none;"></video>
      <div id="scanResult" style="margin:16px 0; font-weight:600; color:#065f46;"></div>
      <button id="stopBtn" class="main-btn" onclick="stopQRScanner()" style="display:none; background:#ef4444;">Stop Scanner</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// Wallet Core (inspired by defispark/wallet.js style)
// ──────────────────────────────────────────────

const USDT = "0x55d398326f99059ff775485246999027b3197955";
const BSC_RPC = "https://bsc-dataseed.binance.org/";
const CHAIN_ID = "56";

const web3 = new Web3(BSC_RPC);
const usdt = new web3.eth.Contract([
  {"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"},
  {"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"}
], USDT);

let account = null;

function generateNewWallet() {
  account = web3.eth.accounts.create();
  saveWallet();
  showWallet();
}

function importWallet() {
  const pk = document.getElementById("privateKey").value.trim();
  if (!pk.startsWith("0x") || pk.length !== 66) return alert("Invalid private key format");
  try {
    account = web3.eth.accounts.privateKeyToAccount(pk);
    saveWallet();
    showWallet();
  } catch(e) {
    alert("Invalid private key");
  }
}

function saveWallet() {
  if (account) {
    localStorage.setItem("defispark_wallet_pk", account.privateKey);
    document.getElementById("privateKey").value = account.privateKey; // show once
  }
}

function loadWallet() {
  const pk = localStorage.getItem("defispark_wallet_pk");
  if (pk) {
    account = web3.eth.accounts.privateKeyToAccount(pk);
    showWallet();
  }
}

function showWallet() {
  document.getElementById("walletDashboard").style.display = "block";
  document.getElementById("userAddress").textContent = account.address;
  checkBalance();
}

function copyAddress() {
  navigator.clipboard.writeText(account.address);
  alert("Address copied!");
}

async function checkBalance() {
  if (!account) return;
  try {
    const bal = await usdt.methods.balanceOf(account.address).call();
    document.getElementById("balance").textContent = Number(web3.utils.fromWei(bal, "ether")).toFixed(4);
  } catch(e) {
    console.error(e);
  }
}

function generateReceiveQR() {
  const amt = parseFloat(document.getElementById("receiveAmount").value) || 0;
  let uri = account.address;
  if (amt > 0) {
    const wei = web3.utils.toWei(amt.toString(), "ether");
    uri = `${USDT}@${CHAIN_ID}/transfer?address=${account.address}&uint256=${wei}`;
  }
  document.getElementById("qrcode").innerHTML = "";
  new QRCodeStyling({
    width: 260, height: 260,
    data: uri,
    margin: 8,
    qrOptions: { errorCorrectionLevel: "H" },
    dotsOptions: { color: "#000", type: "rounded" },
    backgroundOptions: { color: "#fff" }
  }).append(document.getElementById("qrcode"));
}

async function sendUSDT() {
  if (!account) return alert("No wallet loaded");
  const to = document.getElementById("sendTo").value.trim();
  const amtStr = document.getElementById("sendAmount").value;
  const amt = parseFloat(amtStr);
  if (!to || isNaN(amt) || amt <= 0) return alert("Invalid recipient or amount");

  const statusEl = document.getElementById("sendStatus");
  const msgEl = document.getElementById("sendMsg");
  statusEl.style.display = "flex";
  msgEl.textContent = "Preparing transaction...";

  try {
    const value = web3.utils.toWei(amt.toString(), "ether");
    const data = usdt.methods.transfer(to, value).encodeABI();
    const gas = await usdt.methods.transfer(to, value).estimateGas({from: account.address});
    const gasPrice = await web3.eth.getGasPrice();

    const tx = { from: account.address, to: USDT, gas, gasPrice, data };
    const signed = await web3.eth.accounts.signTransaction(tx, account.privateKey);
    const receipt = await web3.eth.sendSignedTransaction(signed.rawTransaction);

    msgEl.textContent = `Success! Tx: ${receipt.transactionHash.slice(0,10)}...`;
    statusEl.className = "status success";
    checkBalance();
  } catch(e) {
    msgEl.textContent = "Failed: " + (e.message || e);
    statusEl.className = "status waiting";
  }
}

// ──────────────────────────────────────────────
// QR Scanner
// ──────────────────────────────────────────────

let stream;
const video = document.getElementById("video");
const stopBtn = document.getElementById("stopBtn");

async function startQRScanner() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    video.style.display = "block";
    stopBtn.style.display = "block";
    video.play();
    requestAnimationFrame(scan);
  } catch(e) {
    alert("Cannot access camera: " + e.message);
  }
}

function stopQRScanner() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.style.display = "none";
  stopBtn.style.display = "none";
  document.getElementById("scanResult").textContent = "";
}

function scan() {
  if (video.videoWidth === 0) return requestAnimationFrame(scan);
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  const code = jsQR(canvas.getContext("2d").getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
  if (code) {
    handleScanned(code.data);
    stopQRScanner();
  } else {
    requestAnimationFrame(scan);
  }
}

function handleScanned(data) {
  document.getElementById("scanResult").textContent = "Detected: " + data.substring(0,40) + "...";
  if (data.startsWith("0x") && data.length === 42) {
    document.getElementById("sendTo").value = data;
    openTab("send");
  } else if (data.includes("transfer?")) {
    try {
      const url = new URL(data.startsWith("ethereum:") ? data.replace("ethereum:", "https://") : data);
      const addr = url.searchParams.get("address");
      const val = url.searchParams.get("uint256");
      if (addr) document.getElementById("sendTo").value = addr;
      if (val) {
        const amt = Number(web3.utils.fromWei(val, "ether")).toFixed(6);
        document.getElementById("sendAmount").value = amt;
      }
      openTab("send");
    } catch(e) {}
  }
}

function openTab(name) {
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
  document.getElementById(name).classList.add("active");
  document.querySelector(`[onclick="openTab('${name}')"]`).classList.add("active");
}

// Init
window.addEventListener("load", () => {
  loadWallet();
  if (!account) {
    alert("No wallet found. Generate or import one to start.");
  }
});
</script>
</body>
</html>
