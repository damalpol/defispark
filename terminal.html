<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deposit USDT (BSC)</title>
  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3@4.0.3/dist/web3.min.js"></script>
  <style>
    :root{--primary:#10b981;--success:#059669;--bg:#f8f9fc;--card:#ffffff}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);margin:0;padding:20px;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .container{max-width:420px;width:100%;background:var(--card);padding:32px;border-radius:24px;box-shadow:0 25px 50px rgba(0,0,0,.1);text-align:center;position:relative;overflow:hidden}
    h1{font-size:28px;margin:0 0 8px;color:#111}
    p.subtitle{color:#64748b;margin-bottom:16px}
    #qrcode{margin:24px auto}
    .address-box{position:relative;background:#f1f5f9;padding:16px;border-radius:16px;font-family:monospace;margin:20px 0;word-break:break-all;font-size:15px;color:#1e40af}
    .copy-btn{position:absolute;right:10px;top:10px;background:#3b82f6;color:white;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px}
    .copy-btn:hover{background:#2563eb}
    .status{padding:18px;border-radius:16px;font-weight:700;font-size:19px;margin-top:20px;transition:all .5s}
    .waiting{background:#fef3c7;color:#92400e}
    .success{background:#d1fae5;color:#065f46;border:2px solid #86efac}
    .spinner{display:inline-block;width:18px;height:18px;border:4px solid #f3f3f3;border-top:4px solid var(--primary);border-radius:50%;animation:s 1s linear infinite;margin-right:10px}
    @keyframes s{to{transform:rotate(360deg)}}
    .thankyou{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#10b981,#059669);color:white;position:fixed;top:0;left:0;width:100%;z-index:9999;animation:fadeIn .8s}
    .thankyou h1{font-size:42px;margin:0 0 16px}
    .thankyou p{font-size:20px;max-width:600px;margin:12px auto;opacity:.95}
    .amount{font-size:60px;font-weight:900;margin:20px 0;letter-spacing:-2px}
    .progress{width:80%;height:8px;background:rgba(255,255,255,.3);border-radius:4px;overflow:hidden;margin:30px 0}
    .bar{height:100%;background:white;width:0%;border-radius:4px;animation:fill 4s ease-out forwards}
    @keyframes fill{to{width:100%}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .emoji{font-size:60px;margin-bottom:20px}
    .btn-deposit-again{background:white;color:#059669;font-weight:700;padding:16px 40px;border-radius:16px;font-size:20px;cursor:pointer;border:none;box-shadow:0 10px 30px rgba(0,0,0,.2);margin-top:20px}
    .btn-deposit-again:hover{transform:translateY(-4px);box-shadow:0 15px 35px rgba(0,0,0,.3)}
    .amount-input-group{margin:24px 0 16px}
    .amount-input-group label{display:block;margin-bottom:8px;font-weight:600;color:#374151}
    .amount-input-group input{width:100%;padding:14px;font-size:17px;border:1px solid #d1d5db;border-radius:12px;box-sizing:border-box}
    .update-qr-btn{margin-top:12px;background:var(--primary);color:white;border:none;padding:14px 28px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
    .update-qr-btn:hover{background:#059669}
  </style>
  <link href="https://rsms.me/inter/inter.css" rel="stylesheet">
</head>
<body>

<div class="container" id="depositPage">
  <h1>OKX wallet Deposit USDT</h1>
  <p class="subtitle">Send any amount on Binance Smart Chain</p>

  <div class="amount-input-group">
    <label for="depositAmount">Amount to receive (USDT):</label>
    <input type="number" id="depositAmount" placeholder="e.g. 100" step="0.01" min="0.01">
    <button class="update-qr-btn" onclick="updateQR()">Update QR Code</button>
  </div>

  <div id="qrcode"></div>

  <div class="address-box">
    0x0acedca91817eace78e4d31b166ba2b523fcba66
    <button class="copy-btn" onclick="copyAddress()">Copy</button>
  </div>

  <div id="status" class="status waiting">
    <span class="spinner"></span>
    <span id="statusText">Waiting for deposit...</span>
  </div>

  <div id="txlink" style="margin-top:12px;font-size:14px;"></div>
</div>

<div class="thankyou" id="thankyouPage">
  <div class="emoji">🎉</div>
  <h1>Congratulations!</h1>
  <div class="amount" id="finalAmount">0 USDT</div>
  <p id="dynamicMessage">Your deposit was received instantly!</p>
  <p>Your funds are being processed. Thank you!</p>
  <div class="progress"><div class="bar"></div></div>
  <button class="btn-deposit-again" onclick="location.reload()">Make Another Deposit</button>
</div>

<script>
  const DEPOSIT_ADDRESS = "0x0acedca91817eace78e4d31b166ba2b523fcba66".toLowerCase();
  const USDT_CONTRACT   = "0x55d398326f99059ff775485246999027b3197955";
  const CHAIN_ID        = "56";
  const BSC_RPC         = "https://bsc-dataseed.binance.org/";
  const STORAGE_KEY     = "usdt_balance";

  let currentQRData = DEPOSIT_ADDRESS;

  // Generate QR code (with optional amount)
  function generateQR(amountUSDT = null) {
    let uri = DEPOSIT_ADDRESS;

    if (amountUSDT && amountUSDT > 0) {
      // Convert to wei (18 decimals) - using BigInt to avoid precision issues
      const amountScaled = Math.round(amountUSDT * 1e18);
      const amountWei = BigInt(amountScaled).toString();
      uri = `${USDT_CONTRACT}@${CHAIN_ID}/transfer?address=${DEPOSIT_ADDRESS}&uint256=${amountWei}`;
    }

    // Clear previous QR
    document.getElementById("qrcode").innerHTML = "";

    new QRCodeStyling({
      width: 280,
      height: 280,
      data: uri,
      margin: 10,
      qrOptions: { errorCorrectionLevel: "H" },
      dotsOptions: { color: "#000", type: "rounded" },
      backgroundOptions: { color: "#fff" }
    }).append(document.getElementById("qrcode"));

    currentQRData = uri;
  }

  // Initial QR (no amount pre-filled)
  generateQR();

  // Called when user clicks "Update QR Code"
  function updateQR() {
    const input = document.getElementById("depositAmount");
    const val = parseFloat(input.value);

    if (isNaN(val) || val <= 0) {
      alert("Please enter a valid amount greater than 0");
      return;
    }

    generateQR(val);
    document.getElementById("statusText").textContent = `QR updated for ${val.toFixed(2)} USDT – ready to scan`;
  }

  function copyAddress() {
    navigator.clipboard.writeText(DEPOSIT_ADDRESS);
    const b = document.querySelector(".copy-btn");
    const old = b.textContent;
    b.textContent = "Copied!";
    setTimeout(() => b.textContent = old, 1500);
  }

  const web3 = new Web3(BSC_RPC);
  const usdt = new web3.eth.Contract([
    { "constant": true, "inputs": [{ "name": "_owner", "type": "address" }], "name": "balanceOf", "outputs": [{ "name": "balance", "type": "uint256" }], "type": "function" }
  ], USDT_CONTRACT);

  function getMessage(a) {
    if (a < 10)  return "Welcome! Every dollar starts a journey!";
    if (a < 100) return "Awesome! Your investment is live!";
    if (a < 1000) return "Wow — huge commitment! Thank you!";
    return "Legendary deposit! You're a superstar!";
  }

  let hasCelebrated = false;

  async function check() {
    if (hasCelebrated) return;

    try {
      const balanceWei = await usdt.methods.balanceOf(DEPOSIT_ADDRESS).call();
      const balance = Number(web3.utils.fromWei(balanceWei, "ether"));
      const saved = localStorage.getItem(STORAGE_KEY);
      const lastKnown = saved ? Number(saved) : 0;

      if (balance > lastKnown && balance > 0.01) {
        localStorage.setItem(STORAGE_KEY, balance.toString());
        hasCelebrated = true;

        document.getElementById("status").className = "status success";
        document.getElementById("statusText").textContent = `Success! ${balance.toFixed(6)} USDT received`;

        // Try to get latest tx
        const latestTxs = await fetch(`https://api.bscscan.com/api?module=account&action=tokentx&contractaddress=${USDT_CONTRACT}&address=${DEPOSIT_ADDRESS}&page=1&offset=1&sort=desc&apikey=YourApiKeyToken`).then(r => r.json());
        const txHash = latestTxs.result?.[0]?.hash || "";

        if (txHash) {
          document.getElementById("txlink").innerHTML = `<a href="https://bscscan.com/tx/${txHash}" target="_blank" style="color:#10b981;">View Transaction</a>`;
        }

        confetti({ particleCount: 400, spread: 90, origin: { y: 0.6 } });
        new Audio("https://assets.mixkit.co/sfx/preview/mixkit-coin-win-notification-1939.mp3").play().catch(()=>{});

        setTimeout(() => {
          document.getElementById("finalAmount").textContent = `${balance.toFixed(2)} USDT`;
          document.getElementById("dynamicMessage").textContent = getMessage(balance);
          document.getElementById("depositPage").style.display = "none";
          document.getElementById("thankyouPage").style.display = "flex";
        }, 3000);

      } else if (balance > 0) {
        document.getElementById("statusText").textContent = `Current balance: ${balance.toFixed(6)} USDT`;
      }

    } catch (e) {
      console.log("Network error:", e.message);
      document.getElementById("statusText").textContent = "Checking... (network retry)";
    }
  }

  // Start checking + poll every 8 seconds
  check();
  setInterval(check, 8000);
</script>
</body>
</html>
